services:
  - type: web
    name: mrecw-connect-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
